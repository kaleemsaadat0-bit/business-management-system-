name: iqbal_traders
description: IQBAL TRADERS Business Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # Localization
  intl: ^0.19.0

  # File & Storage
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  share_plus: ^10.0.2

  # Excel Export
  excel: ^4.0.6

  # PDF & Print
  pdf: ^3.11.1
  printing: ^5.13.2

  # Icons
  cupertino_icons: ^1.0.8

  # Utils
  uuid: ^4.5.1
  collection: ^1.18.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
